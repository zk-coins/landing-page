name: Quality

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      # npm 11 occasionally aborts with "Exit handler never called"; one retry
      # keeps the lockfile-strict install without flaking the gate.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Formatting (prettier)
        run: npm run format:check

      - name: i18n source ↔ generated pages
        run: npm run i18n:check

      - name: Site completeness
        run: npm run check:site

      - name: Unit tests + 100% coverage
        run: npm run test:coverage
