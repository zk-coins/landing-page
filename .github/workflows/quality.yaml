name: Quality

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      # npm 11 occasionally aborts with "Exit handler never called"; one retry
      # keeps the lockfile-strict install without flaking the gate.
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Formatting (prettier)
        run: npm run format:check

      - name: i18n source ↔ generated pages
        run: npm run i18n:check

      - name: Site completeness
        run: npm run check:site

      - name: Unit tests + 100% coverage
        run: npm run test:coverage
