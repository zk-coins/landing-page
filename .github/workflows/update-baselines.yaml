# TEMPORARY — regenerate screenshot baselines in the pinned container.
name: Update baselines
on:
  push:
    branches: [fix/da-tradeoff-honesty]
permissions:
  contents: read
jobs:
  update:
    name: Regenerate screenshots
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm ci --no-audit --no-fund
      - name: Regenerate baselines
        run: npx playwright test --update-snapshots
      - name: Upload baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: screenshot-baselines
          path: tests/__screenshots__/
          retention-days: 1
