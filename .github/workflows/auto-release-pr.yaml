name: Auto Release PR

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-release-pr
  cancel-in-progress: false

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch main branch
        run: git fetch origin main || echo "main does not exist yet, skipping"

      - name: Verify main exists
        id: main-exists
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::main branch does not exist yet — skipping release PR"
          fi

      - name: Check for existing PR
        id: check-pr
        if: steps.main-exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list --base main --head develop --state open --json number --jq 'length')
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::Open PRs from develop to main: $PR_COUNT"

      - name: Check for differences
        id: check-diff
        if: steps.main-exists.outputs.exists == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          DIFF_COUNT=$(git rev-list --count origin/main..origin/develop)
          if [ "$DIFF_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "commit_count=$DIFF_COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::Commits ahead of main: $DIFF_COUNT"

      - name: Create Release PR
        if: steps.main-exists.outputs.exists == 'true' && steps.check-pr.outputs.pr_exists == 'false' && steps.check-diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_COUNT: ${{ steps.check-diff.outputs.commit_count }}
        run: |
          printf '%s\n' \
            "## Automatic Release PR" \
            "" \
            "Created after changes were pushed to \`develop\`." \
            "" \
            "**Commits:** ${COMMIT_COUNT} new commit(s)." \
            "" \
            "### Checklist" \
            "- [ ] Review all changes" \
            "- [ ] Verify CI passes" \
            "- [ ] Approve and merge when ready for production" \
            > /tmp/pr-body.md

          gh pr create \
            --base main \
            --head develop \
            --title "Release: develop -> main" \
            --body-file /tmp/pr-body.md
