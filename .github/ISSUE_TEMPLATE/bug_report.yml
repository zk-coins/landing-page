name: Bug report
description: Something on the live site is broken or wrong.
labels: [bug]
body:
  - type: input
    id: url
    attributes:
      label: Affected URL
      placeholder: https://zkcoins.com/
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: Firefox 130 on macOS 15
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional)
